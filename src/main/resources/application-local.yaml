spring:
  datasource:
    url: "jdbc:h2:file:./data/receipts;DB_CLOSE_ON_EXIT=FALSE"
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    open-in-view: false
    hibernate:
      ddl-auto: update

  h2:
    console:
      enabled: true
      path: /h2-console